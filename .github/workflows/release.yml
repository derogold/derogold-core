name: Release

on:
  push:
    tags:
      - 'v*.*.*.*'

permissions:
  contents: write

defaults:
  run:
    shell: pwsh

jobs:
  build:
    name: ${{ matrix.build_preset }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            compiler: msvc
            install: ""
            configure_preset: windows-x64-msvc-package
            build_preset: windows-x64-msvc-package

          - os: ubuntu-22.04
            arch: x64
            compiler: gcc
            install: >-
              build-essential
              curl
              gcc-9
              g++-9
              git
              ninja-build
              pkg-config
              tar
              unzip
              zip
            configure_preset: linux-x64-gcc-package
            build_preset: linux-x64-gcc-package

          - os: ubuntu-22.04
            arch: arm64
            compiler: gcc
            install: >-
              curl
              gcc-9-aarch64-linux-gnu
              g++-9-aarch64-linux-gnu
              git
              ninja-build
              pkg-config
              tar
              unzip
              zip
            configure_preset: linux-arm64-gcc-cross-package
            build_preset: linux-arm64-gcc-cross-package

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Install Prerequisites
        run: |
          if ("${{ runner.os }}" -eq "Linux")
          {
            if (![string]::IsNullOrWhiteSpace("${{ matrix.install }}"))
            {
              sudo apt-get update
              sudo apt-get install -y ${{ matrix.install }}
            }
          }

      - name: Install CMake
        uses: lukka/get-cmake@v3.31.6

      - name: Setup ccache
        uses: jianmingyong/ccache-action@v1

      - name: Pin GCC 9 (Linux)
        if: runner.os == 'Linux'
        run: |
          if ("${{ matrix.arch }}" -eq "x64")
          {
            sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-9 9
            sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-9 9
            sudo update-alternatives --set gcc /usr/bin/gcc-9
            sudo update-alternatives --set g++ /usr/bin/g++-9
          }
          elseif ("${{ matrix.arch }}" -eq "arm64")
          {
            sudo update-alternatives --install /usr/bin/aarch64-linux-gnu-gcc aarch64-linux-gnu-gcc /usr/bin/aarch64-linux-gnu-gcc-9 9
            sudo update-alternatives --install /usr/bin/aarch64-linux-gnu-g++ aarch64-linux-gnu-g++ /usr/bin/aarch64-linux-gnu-g++-9 9
            sudo update-alternatives --set aarch64-linux-gnu-gcc /usr/bin/aarch64-linux-gnu-gcc-9
            sudo update-alternatives --set aarch64-linux-gnu-g++ /usr/bin/aarch64-linux-gnu-g++-9
          }
        with:
          ccache-key-prefix: ccache_cache_${{ runner.os }}_${{ matrix.arch }}_${{ matrix.compiler }}
          max-size: 150M

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11.5

      - name: Build
        uses: lukka/run-cmake@v10.8
        with:
          configurePreset: '${{ matrix.configure_preset }}'
          buildPreset: '${{ matrix.build_preset }}'

      - name: Collect Logs on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.compiler }}-vcpkg-build-logs
          path: ${{ github.workspace }}/vcpkg/buildtrees/**/*.log
          if-no-files-found: ignore

      - name: Upload Package Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.compiler }}-build
          path: |
            ${{ github.workspace }}/build/Packaging/*.zip
            ${{ github.workspace }}/build/Packaging/*.tar.gz
          if-no-files-found: ignore

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: build
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          files: |
            ${{ github.workspace }}/build/*.zip
            ${{ github.workspace }}/build/*.tar.gz
